//
// Local copy of compat/grpc-bridge/src/LabAcacia.GrpcBridge/Protos/nwp_bridge.proto
// with a distinct csharp_namespace so the demo can generate CLIENT stubs here
// while still referencing the bridge library (which generates SERVER stubs).
// The proto wire format is identical — only the .NET namespaces differ.

syntax = "proto3";

package labacacia.grpc_bridge.v1;

option csharp_namespace = "NPS.Demo.BridgePlayground.Grpc";

service NwpBridge {
  rpc GetManifest(ManifestRequest) returns (ManifestResponse);
  rpc Invoke(InvokeRequest) returns (InvokeResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc ListActions(ActionsRequest) returns (ActionsResponse);
}

message UpstreamContext {
  string upstream        = 1;
  string agent_nid       = 2;
  string idempotency_key = 3;
  string traceparent     = 4;
}

message ManifestRequest  { UpstreamContext ctx = 1; }
message ManifestResponse {
  bytes  nwm_json  = 1;
  string node_type = 2;
}

message InvokeRequest {
  UpstreamContext ctx         = 1;
  string          action_id   = 2;
  bytes           params_json = 3;
}
message InvokeResponse {
  int32  http_status = 1;
  bytes  body_json   = 2;
  string task_id     = 3;
}

message QueryRequest  {
  UpstreamContext ctx        = 1;
  bytes           query_json = 2;
}
message QueryResponse {
  int32 http_status = 1;
  bytes body_json   = 2;
}

message ActionsRequest  { UpstreamContext ctx = 1; }
message ActionsResponse { bytes actions_json = 1; }
